[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    asyncio: Async tests
    slow: Slow running tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
filterwarnings =
    ignore::DeprecationWarning
